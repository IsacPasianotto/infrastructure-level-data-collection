---
apiVersion: v1
kind: ConfigMap
metadata:
  name: energymeter-config
  namespace: temporaldb
data:
  config.ini: |
    [application]
    url = http://energyteam.area.trieste.it/
    polling_interval = 60
    bind_address = 0.0.0.0
    bind_port = 8089
    http_auth_required = true
    channel_range = 2033,2048
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: energymeter
  namespace: temporaldb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: energymeter
  template:
    metadata:
      labels:
        app: energymeter
    spec:
      containers:
        - name: energymeter
          image: pasianeight/python-energymeter:0.1.4
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8089
          envFrom:
            - secretRef:
                name: energymeter-secret
          # Important, the default entrypoint assumes that the config file is located at /app/config/config.ini
          # command: ["bash", "-lc"]
          # args:
          #   - |
          #     sleep infinity
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          resources:
            limits:
              cpu: "1"
              memory: "1024Mi"
            requests:
              cpu: "250m"
              memory: "128Mi"
      volumes:
        - name: config
          configMap:
            name: energymeter-config
            items:
              - key: config.ini
                path: config.ini
---
apiVersion: v1
kind: Service
metadata:
  name: energymeter-svc
  namespace: temporaldb
spec:
  type: ClusterIP
  selector:
    app: energymeter
  ports:
    - name: http
      port: 8089
      targetPort: 8089